services:
  - type: web
    name: silent-sos-backend
    runtime: node
    rootDir: backend
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: CLIENT_URL
        value: https://silent-sos-rust.vercel.app
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        generateValue: true
